name: Auto Approve Release Please PRs

on:
  pull_request_target:
    types: [opened, synchronize]

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    if: |
      (github.actor == 'github-actions[bot]' || github.actor == 'release-please[bot]') &&
      startsWith(github.head_ref, 'release-please--')
    steps:
      - uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          review-message: "Auto-approved release-please pull request containing CHANGELOG and version updates."
